<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56">
  <!-- INTOPS (오렌지 굵은 글씨) -->
  <text x="0" y="42" font-family="Arial, 'Apple SD Gothic Neo', sans-serif"
        font-weight="900" font-size="42" fill="#FF7A1A" letter-spacing="-1.5">INTOPS</text>
  <!-- 오렌지 별표 (S 우측 상단) -->
  <text x="170" y="20" font-family="Arial, sans-serif"
        font-weight="900" font-size="20" fill="#FF7A1A">✻</text>
  <!-- GROWING / TOGETHER (회색, 2줄로 우측 배치) -->
  <text x="195" y="28" font-family="Arial, sans-serif"
        font-weight="700" font-size="11" letter-spacing="1.5" fill="#999999">GROWING</text>
  <text x="195" y="42" font-family="Arial, sans-serif"
        font-weight="700" font-size="11" letter-spacing="1.5" fill="#999999">TOGETHER</text>
</svg>
